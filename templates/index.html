<!DOCTYPE html>
<body>

<div class="background"></div>

<div class="container">

    <div class="header">
        <h1>🎓 Student Performance Prediction</h1>
        <p>AI Based Academic Performance Analysis System</p>
    </div>

    <form action="/predict" method="post">

        <div class="input-group">
            <label>Study Hours</label>
            <input type="number" step="any" name="hours_study" placeholder="Enter Study Hours" required>
        </div>

        <div class="input-group">
            <label>Attendance (%)</label>
            <input type="number" step="any" name="attendance" placeholder="Enter Attendance Percentage" required>
        </div>

        <div class="input-group">
            <label>Previous Score</label>
            <input type="number" step="any" name="previous_score" placeholder="Enter Previous Marks" required>
        </div>

        <div class="input-group">
            <label>Internet Access</label>
            <select name="internet_access">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="input-group">
            <label>Extracurricular Activities</label>
            <select name="extracurricular">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="input-group">
            <label>Parents Education Level</label>
            <select name="parent_education">
                <option value="0">Low</option>
                <option value="1">Medium</option>
                <option value="2">High</option>
                <option value="3">Very High</option>
            </select>
        </div>

        <button type="submit">Predict Performance</button>

    </form>

    {% if prediction_text %}
    <div class="result-box">
        <h2>{{ prediction_text }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h2>Student Performance Predictor</h2>
        
        <form action="/predict" method="POST">
            
            <div class="form-group">
                <label for="hours">Study Hours (Per Week):</label>
                <input type="number" id="hours" name="hours_study" min="0" max="100" step="0.1" required placeholder="e.g. 15.5">
            </div>

            <div class="form-group">
                <label for="attendance">Attendance (%):</label>
                <input type="number" id="attendance" name="attendance" min="0" max="100" required placeholder="e.g. 85">
            </div>

            <div class="form-group">
                <label for="papers">Previous Exam Score:</label>
                <input type="number" id="papers" name="previous_score" min="0" max="100" required placeholder="e.g. 75">
            </div>

            <div class="form-group">
                <label for="internet">Internet Access:</label>
                <select id="internet" name="internet_access" required>
                    <option value="" disabled selected>Select Option</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="extra">Extracurricular Activities:</label>
                <select id="extra" name="extracurricular" required>
                    <option value="" disabled selected>Select Option</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="parent">Parent Education Level:</label>
                <select id="parent" name="parent_education" required>
                    <option value="" disabled selected>Select Level</option>
                    <option value="0">Low</option>
                    <option value="1">Medium</option>
                    <option value="2">High</option>
                </select>
            </div>

            <button type="submit">Predict Performance</button>
        </form>

        {% if prediction_text %}
        <div class="result-box">
            <h3>Prediction Result</h3>
            <div class="score" style="font-size: 18px; margin-top: 10px;">{{ prediction_text }}</div>
        </div>
        {% endif %}

    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Student Performance Prediction System</h1>

    <form action="/predict" method="post">

        <input type="number" step="any" name="hours_study" placeholder="Study Hours" required>

        <input type="number" step="any" name="attendance" placeholder="Attendance Percentage" required>

        <input type="number" step="any" name="previous_score" placeholder="Previous Score" required>

        <select name="internet_access">
            <option value="1">Internet Access - Yes</option>
            <option value="0">Internet Access - No</option>
        </select>

        <select name="extracurricular">
            <option value="1">Extracurricular Activities - Yes</option>
            <option value="0">Extracurricular Activities - No</option>
        </select>

        <select name="parent_education">
            <option value="0">Parents Education - Low</option>
            <option value="1">Parents Education - Medium</option>
            <option value="2">Parents Education - High</option>
            <option value="3">Parents Education - Very High</option>
        </select>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
